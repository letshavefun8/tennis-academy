<!-- @dsCard group="Экран вопроса (A/B)" name="Вариант C — Покажи на корте" subtitle="Пространственный выбор · тап по зоне корта" width="430" height="820" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Вариант C «Покажи на корте» — Академия тенниса</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FBF7EF; --surface:#FFFFFF; --surface-soft:#F4EFE4;
  --brand:#1F6F50; --brand-ink:#134B36;
  --accent:#C7E03A; --accent-ink:#2C3A00; --accent-deep:#A8C72A;
  --warm:#F2A03D;
  --success:#2E9E5B; --success-bg:#E9F7EE;
  --text:#1C2B23; --muted:#5E6B63;
  --border:#E7E1D4; --border-strong:#D4CCBA;
  --court:#2E8B63; --court-line:#FFFFFF;
  --r-card:16px; --r-btn:14px; --r-pill:999px;
  --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:20px; --s6:24px;
  --sh-card:0 1px 2px rgba(28,43,35,.04),0 4px 12px rgba(28,43,35,.06);
  --font-display:'Unbounded',system-ui,sans-serif;
  --font-body:'Nunito',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body); background:linear-gradient(170deg,#FBF7EF 0%,#FaF5E9 60%,#FBF6EC 100%); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased}
.screen{max-width:480px; margin:0 auto; padding:var(--s4) var(--s4) 40px; min-height:100vh}

.topbar{display:flex; align-items:center; gap:var(--s2); margin-bottom:var(--s5)}
.btn-back{font-size:1.4rem; color:var(--muted); background:none; border:none; cursor:pointer; min-width:44px; min-height:44px; line-height:1}
.dots{display:flex; gap:6px; flex:1; justify-content:center}
.dot{width:9px; height:9px; border-radius:999px; background:#E3DCCD}
.dot.done{background:var(--success)}
.dot.cur{background:var(--warm); box-shadow:0 0 0 3px rgba(242,160,61,.2)}
.stake{flex:0 0 auto; background:var(--surface); border:1px solid var(--border-strong); color:var(--brand-ink); border-radius:var(--r-pill); padding:5px 12px; font-weight:800; font-size:.82rem}

/* короткий вопрос-инструкция */
.q-topic{font-size:.82rem; font-weight:800; letter-spacing:.04em; text-transform:uppercase; color:var(--brand); margin-bottom:var(--s2); text-align:center}
.q-text{font-size:1.3rem; line-height:1.45; font-weight:700; text-align:center; margin-bottom:var(--s5); font-family:var(--font-display)}

/* корт с тап-зонами */
.court-wrap{background:var(--surface); border:1px solid var(--border); border-radius:var(--r-card); padding:var(--s4); box-shadow:var(--sh-card); margin-bottom:var(--s5)}
.court-svg{display:block; width:100%; height:auto}
.zone{cursor:pointer}
.zone .hit{fill:rgba(255,255,255,.14); stroke:#fff; stroke-width:2; stroke-dasharray:5 4; transition:fill .15s}
.zone:hover .hit{fill:rgba(199,224,58,.30)}
.zone .lbl-bg{fill:var(--surface)}
.zone .lbl-ring{fill:none; stroke:var(--brand); stroke-width:2}
.zone .lbl-tx{font-family:var(--font-display); font-weight:700; font-size:15px; fill:var(--brand-ink)}
.zone .cap{font-family:var(--font-body); font-weight:700; font-size:11px; fill:#fff}
.court-svg.answered .zone{cursor:default}
.zone.correct .hit{fill:rgba(46,158,91,.55); stroke:#fff; stroke-dasharray:none}
.zone.correct .lbl-bg{fill:var(--success)}
.zone.correct .lbl-ring{stroke:#fff}
.zone.correct .lbl-tx{fill:#fff}
.zone.notbest .hit{fill:rgba(107,122,134,.4)}
.court-svg.answered .zone:not(.correct):not(.notbest){opacity:.45}
.traj{stroke:var(--accent); stroke-width:4; stroke-linecap:round; fill:none; opacity:0; stroke-dasharray:340; stroke-dashoffset:340}
.traj.show{opacity:1; animation:draw .6s ease-out forwards}
@keyframes draw{to{stroke-dashoffset:0}}
.ball{fill:var(--accent); stroke:var(--accent-deep); stroke-width:1.5; opacity:0}
.ball.show{opacity:1; animation:rise .4s .5s both}

.explain{display:none; gap:var(--s3); background:var(--surface); border:1px solid var(--border); border-left:4px solid var(--brand); border-radius:var(--r-card); padding:var(--s4); box-shadow:var(--sh-card); margin-bottom:var(--s5)}
.explain.show{display:flex; animation:rise .3s ease-out}
@keyframes rise{from{opacity:0; transform:translateY(8px)}to{opacity:1; transform:none}}
.ace{font-size:2.6rem; line-height:1; flex:0 0 auto}
.explain .reaction{font-family:var(--font-display); font-weight:700; color:var(--brand); margin-bottom:var(--s1); font-size:1.05rem}
.explain .ex-label{font-size:.72rem; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin-bottom:4px}
.explain .ex-text{font-size:1rem; line-height:1.5}
.cta{display:none; width:100%; font-family:var(--font-display); font-weight:700; font-size:1.1rem; color:var(--accent-ink); background:var(--accent); border:none; border-radius:var(--r-btn); padding:16px; min-height:56px; cursor:pointer; box-shadow:0 6px 16px rgba(168,199,42,.35); transition:transform .08s, background .15s}
.cta.show{display:block; animation:rise .3s ease-out}
.cta:hover{background:var(--accent-deep)}
.cta:active{transform:translateY(1px) scale(.99)}
.tag{position:fixed; bottom:6px; right:10px; font-size:.7rem; color:#B9A06A; opacity:.7}
</style>
</head>
<body>
  <div class="screen">
    <div class="topbar">
      <button class="btn-back" title="Выйти">←</button>
      <div class="dots"><span class="dot done"></span><span class="dot done"></span><span class="dot cur"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
      <span class="stake">🎾 +20</span>
    </div>

    <p class="q-topic">🎯 Тактика</p>
    <p class="q-text">Куда направить мяч в спокойном розыгрыше?</p>

    <div class="court-wrap">
      <svg class="court-svg" id="court" viewBox="0 0 300 360" role="img" aria-label="Схема корта с зонами выбора">
        <!-- корт -->
        <rect x="30" y="20" width="240" height="320" rx="6" fill="var(--court)"/>
        <rect x="30" y="20" width="240" height="320" rx="6" fill="none" stroke="var(--court-line)" stroke-width="2.5"/>
        <line x1="30" y1="180" x2="270" y2="180" stroke="var(--court-line)" stroke-width="2.5"/>
        <line x1="60" y1="80" x2="240" y2="80" stroke="var(--court-line)" stroke-width="1.5"/>
        <line x1="150" y1="80" x2="150" y2="180" stroke="var(--court-line)" stroke-width="1.5"/>
        <line x1="60" y1="20" x2="60" y2="340" stroke="var(--court-line)" stroke-width="1.5" opacity=".6"/>
        <line x1="240" y1="20" x2="240" y2="340" stroke="var(--court-line)" stroke-width="1.5" opacity=".6"/>
        <!-- откуда бьёшь -->
        <circle cx="150" cy="322" r="7" fill="var(--warm)" stroke="#fff" stroke-width="2"/>
        <text x="150" y="348" text-anchor="middle" font-family="Nunito" font-weight="700" font-size="11" fill="var(--muted)">ты бьёшь отсюда</text>

        <!-- траектория к верной зоне (кросс) -->
        <path class="traj" id="traj" d="M150 322 Q 110 200 78 70"/>
        <circle class="ball" id="ball" cx="78" cy="70" r="8"/>

        <!-- зоны -->
        <g class="zone" data-correct="1" data-traj="M150 322 Q 110 200 78 70" data-ball="78,70">
          <rect class="hit" x="42" y="34" width="84" height="78" rx="10"/>
          <circle class="lbl-bg" cx="84" cy="60" r="15"/><circle class="lbl-ring" cx="84" cy="60" r="15"/>
          <text class="lbl-tx" x="84" y="65" text-anchor="middle">А</text>
          <text class="cap" x="84" y="92" text-anchor="middle">кросс</text>
        </g>
        <g class="zone" data-traj="M150 322 Q 180 200 222 70" data-ball="222,70">
          <rect class="hit" x="174" y="34" width="84" height="78" rx="10"/>
          <circle class="lbl-bg" cx="216" cy="60" r="15"/><circle class="lbl-ring" cx="216" cy="60" r="15"/>
          <text class="lbl-tx" x="216" y="65" text-anchor="middle">Б</text>
          <text class="cap" x="216" y="92" text-anchor="middle">по линии</text>
        </g>
        <g class="zone" data-traj="M150 322 L 150 70" data-ball="150,70">
          <rect class="hit" x="120" y="120" width="60" height="50" rx="10"/>
          <circle class="lbl-bg" cx="150" cy="138" r="15"/><circle class="lbl-ring" cx="150" cy="138" r="15"/>
          <text class="lbl-tx" x="150" y="143" text-anchor="middle">В</text>
          <text class="cap" x="150" y="162" text-anchor="middle">в центр</text>
        </g>
        <g class="zone" data-traj="M150 322 Q 120 240 96 150" data-ball="96,150">
          <rect class="hit" x="48" y="120" width="62" height="50" rx="10"/>
          <circle class="lbl-bg" cx="79" cy="138" r="15"/><circle class="lbl-ring" cx="79" cy="138" r="15"/>
          <text class="lbl-tx" x="79" y="143" text-anchor="middle">Г</text>
          <text class="cap" x="79" y="162" text-anchor="middle">коротко</text>
        </g>
      </svg>
    </div>

    <div class="explain" id="explain">
      <div class="ace">🎾</div>
      <div>
        <p class="reaction" id="reaction">В точку! 🎾</p>
        <p class="ex-label">Эйс объясняет</p>
        <p class="ex-text">Видишь трассу? По диагонали сетка ниже, а корт длиннее — мяч надёжнее долетает. Это твой удар по умолчанию.</p>
      </div>
    </div>

    <button class="cta" id="cta">Дальше →</button>
  </div>
  <div class="tag">C · покажи на корте</div>
<script>
var court=document.getElementById('court'),answered=false;
court.querySelectorAll('.zone').forEach(function(z){z.addEventListener('click',function(){if(answered)return;answered=true;court.classList.add('answered');var c=court.querySelector('[data-correct]');c.classList.add('correct');if(!z.dataset.correct){z.classList.add('notbest');document.getElementById('reaction').textContent='Почти! Глянь на трассу 🎾';}
// рисуем трассу к верной зоне
document.getElementById('traj').classList.add('show');document.getElementById('ball').classList.add('show');
document.getElementById('explain').classList.add('show');document.getElementById('cta').classList.add('show');});});
document.getElementById('cta').addEventListener('click',function(){location.reload();});
</script>
</body>
</html>
